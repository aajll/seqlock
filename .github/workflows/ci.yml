name: CI

on:
  push:
    branches: ["master","main"]
  pull_request:
    branches: ["master","main"]

jobs:
  test:
    name: "Test (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            sanitize: address,undefined
          - os: macos-latest
            sanitize: address

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Configure (debug + tests)
        run: meson setup build --buildtype=debug -Dbuild_tests=true -Db_sanitize=${{ matrix.sanitize }}

      - name: Build
        run: meson compile -C build

      - name: Test
        run: meson test -C build --verbose

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      # TSAN and ASAN are mutually exclusive, so this is a dedicated job with
      # only the thread sanitizer. It exercises the concurrent torn-read test
      # (design §7 #5); the library auto-selects its race-free payload copy
      # under TSAN, so a clean run proves the synchronisation, not luck.
      - name: Configure (debug + thread sanitizer)
        run: meson setup build-tsan --buildtype=debug -Dbuild_tests=true -Db_sanitize=thread

      - name: Build
        run: meson compile -C build-tsan

      - name: Test
        run: meson test -C build-tsan --verbose

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson, Ninja, and gcovr
        run: python -m pip install --upgrade meson ninja gcovr

      # -fprofile-update=atomic makes gcov's counter increments atomic. The
      # concurrent tests exercise the same instrumented lines from multiple
      # threads; with the default non-atomic counters those updates race, the
      # arc counts become mutually inconsistent, and gcov's flow-graph solver
      # derives negative branch counts that corrupt the report. Atomic updates
      # keep the counters consistent so coverage is accurate.
      - name: Configure (coverage)
        run: meson setup build-cov --buildtype=debug -Dbuild_tests=true -Db_coverage=true -Dc_args=-fprofile-update=atomic

      - name: Build
        run: meson compile -C build-cov

      - name: Test
        run: meson test -C build-cov

      # Gate on 100% line coverage of the library sources. Branch coverage is
      # reported but not gated: some branches are concurrency-dependent and
      # cannot be forced deterministically on every run.
      - name: Coverage report (100% line gate)
        run: |
          gcovr --root . --filter 'src/' --filter 'include/' \
                --fail-under-line 100 --print-summary

  release-build:
    name: Release build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Meson and Ninja
        run: python -m pip install --upgrade meson ninja

      - name: Configure (release)
        run: meson setup build --buildtype=release -Dbuild_tests=false

      - name: Build
        run: meson compile -C build
